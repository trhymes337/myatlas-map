<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myAtlas — Territory Management</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"><\/script>
<style>
:root {
  --blue:    #2E67B1;
  --blue-lt: #e8f0fb;
  --blue-md: #c2d4f0;
  --green:   #339846;
  --green-lt:#e6f4e9;
  --gray:    #97A3AE;
  --gray-dk: #4a5568;
  --gray-lt: #f4f5f7;
  --gray-md: #e2e6ea;
  --white:   #ffffff;
  --warn:    #F49020;
  --warn-lt: #fef3e2;
  --danger:  #c0392b;
  --danger-lt:#fce8e6;
  --text:    #1a2433;
  --text2:   #5a6a7a;
  --border:  #d1d9e0;
  --shadow:  0 2px 8px rgba(46,103,177,0.10);
  --shadow-lg: 0 8px 32px rgba(46,103,177,0.15);
  --panel: 340px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Open Sans', sans-serif; background: var(--gray-lt); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
header { height: 56px; background: var(--white); border-bottom: 3px solid var(--blue); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; z-index: 1000; box-shadow: var(--shadow); }
.logo { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; white-space: nowrap; display: flex; align-items: center; }
.logo-my { color: var(--gray); font-weight: 500; }
.logo-atlas { color: var(--blue); }
.logo-dot { color: var(--green); font-size: 24px; }
.logo-divider { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }
.header-filters { display: flex; gap: 6px; align-items: center; flex: 1; }
select { font-family: 'Open Sans', sans-serif; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); color: var(--text); padding: 5px 8px; cursor: pointer; outline: none; }
select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-lt); }
.btn { font-family: 'Open Sans', sans-serif; font-size: 12px; font-weight: 600; border-radius: 6px; border: 1px solid transparent; padding: 5px 12px; cursor: pointer; outline: none; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #2558a0; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-secondary { background: var(--white); color: var(--text2); border-color: var(--border); }
.btn-secondary:hover { background: var(--gray-lt); }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-green:hover { background: #2a7d39; }
.btn-green:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-warn { background: var(--warn); color: #fff; border-color: var(--warn); }
.btn-danger-outline { background: var(--white); color: var(--danger); border-color: var(--danger); }
.btn-danger-outline:hover { background: var(--danger-lt); }
.selection-badge { background: var(--blue); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; display: none; font-family: 'Montserrat', sans-serif; }
.header-right { display: flex; gap: 6px; align-items: center; margin-left: auto; }

/* MAIN */
.main { display: flex; flex: 1; overflow: hidden; position: relative; }
#map { flex: 1; background: #dde3ea; }

/* PANEL */
.panel { width: var(--panel); background: var(--white); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; box-shadow: -2px 0 8px rgba(0,0,0,0.05); }
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--gray-lt); }
.tab { flex: 1; padding: 10px 6px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.03em; }
.tab:hover { color: var(--blue); background: var(--blue-lt); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); background: var(--white); }
.panel-body { flex: 1; overflow-y: auto; padding: 12px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* TERRITORY LIST */
.territory-item { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 7px; cursor: pointer; transition: background 0.12s; margin-bottom: 2px; border: 1px solid transparent; }
.territory-item:hover { background: var(--blue-lt); border-color: var(--blue-md); }
.territory-item.active { background: var(--blue-lt); border-color: var(--blue); }
.key-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.15); }
.key-label { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; color: var(--blue); min-width: 34px; }
.key-info { flex: 1; min-width: 0; }
.key-rep { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.key-meta { font-size: 10px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-pill { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; flex-shrink: 0; font-family: 'Montserrat', sans-serif; text-transform: uppercase; }
.status-active { background: var(--green-lt); color: var(--green); }
.status-open { background: var(--warn-lt); color: var(--warn); }
.status-termed { background: var(--danger-lt); color: var(--danger); }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 8px; }
.search-input { width: 100%; background: var(--gray-lt); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 6px 9px; outline: none; }
.search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-lt); }
.search-input::placeholder { color: var(--gray); }

/* DETAIL */
.detail-section { margin-bottom: 14px; }
.detail-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; font-family: 'Montserrat', sans-serif; }
.detail-value { font-size: 13px; color: var(--text); font-weight: 500; }
.detail-value.big { font-family: 'Montserrat', sans-serif; color: var(--blue); font-size: 26px; font-weight: 700; }
.chip-list { display: flex; flex-wrap: wrap; gap: 3px; }
.chip { font-size: 10px; background: var(--gray-lt); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; color: var(--text2); font-family: 'Montserrat', sans-serif; }

/* SELECTED */
.selected-zip-list { max-height: 160px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--gray-lt); }
.selected-zip-item { display: flex; align-items: center; justify-content: space-between; padding: 4px 9px; border-bottom: 1px solid var(--border); font-size: 11px; }
.selected-zip-item:last-child { border-bottom: none; }
.remove-zip { color: var(--text2); cursor: pointer; font-size: 16px; line-height: 1; }
.remove-zip:hover { color: var(--danger); }

/* ACTION PANEL */
.action-panel { padding: 10px 12px; border-top: 2px solid var(--blue); background: var(--blue-lt); flex-shrink: 0; display: none; }
.action-panel.visible { display: block; }
.action-title { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-family: 'Montserrat', sans-serif; }
.action-row { display: flex; gap: 6px; margin-bottom: 5px; }
.action-row .btn { flex: 1; text-align: center; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,36,51,0.45); z-index: 9000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.modal-overlay.visible { display: flex; }
.modal { background: var(--white); border-radius: 12px; padding: 24px; width: 400px; box-shadow: var(--shadow-lg); border-top: 4px solid var(--blue); }
.modal-title { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; color: var(--blue); margin-bottom: 5px; }
.modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; font-family: 'Montserrat', sans-serif; }
.modal-field select { width: 100%; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-warning { background: var(--warn-lt); border: 1px solid var(--warn); border-radius: 6px; padding: 8px 10px; font-size: 11px; color: var(--warn); margin-bottom: 8px; display: none; font-weight: 500; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--white); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 9999; transition: transform 0.3s ease; box-shadow: var(--shadow-lg); font-weight: 500; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--danger); color: var(--danger); }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; gap: 14px; }
.loading-logo { font-family: 'Montserrat', sans-serif; font-size: 34px; font-weight: 700; display: flex; align-items: center; }
.l-my { color: var(--gray); font-weight: 500; }
.l-atlas { color: var(--blue); }
.l-dot { color: var(--green); }
.loading-tag { font-size: 13px; color: var(--gray); font-style: italic; margin-top: -8px; }
.loading-bar { width: 220px; height: 4px; background: var(--gray-md); border-radius: 2px; overflow: hidden; }
.loading-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); border-radius: 2px; width: 0%; transition: width 0.35s ease; }
.loading-status { font-size: 12px; color: var(--text2); }

/* STATE PROMPT */
.state-prompt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--white); border-radius: 12px; padding: 28px 32px; box-shadow: var(--shadow-lg); border-top: 4px solid var(--blue); z-index: 500; text-align: center; width: 360px; }
.state-prompt h2 { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
.state-prompt p { font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.5; }
.state-prompt select { width: 100%; margin-bottom: 8px; }

/* STAT ROW */
.stat-row { display: flex; gap: 6px; margin-bottom: 10px; }
.stat-box { flex: 1; background: var(--gray-lt); border: 1px solid var(--border); border-radius: 8px; padding: 8px; text-align: center; }
.stat-num { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 700; color: var(--blue); }
.stat-lbl { font-size: 9px; color: var(--text2); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.05em; font-family: 'Montserrat', sans-serif; }

.divider { height: 1px; background: var(--border); margin: 10px 0; }
.empty-state { text-align: center; padding: 24px 14px; color: var(--text2); font-size: 12px; line-height: 1.7; }
.empty-icon { font-size: 28px; margin-bottom: 6px; opacity: 0.5; }

/* DATA SOURCE BADGE */
.data-badge { font-size: 9px; color: var(--text2); background: var(--gray-lt); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 0.03em; }

/* Leaflet overrides */
.leaflet-container { background: #dde3ea !important; font-family: 'Open Sans', sans-serif; }
.leaflet-control-zoom a { background: var(--white) !important; color: var(--blue) !important; border-color: var(--border) !important; font-weight: 700 !important; }
.leaflet-control-attribution { background: rgba(255,255,255,0.85) !important; color: var(--text2) !important; font-size: 10px !important; }
.leaflet-popup-content-wrapper { border-radius: 8px !important; box-shadow: var(--shadow-lg) !important; padding: 0 !important; overflow: hidden; border-top: 3px solid var(--blue) !important; }
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip { background: var(--white) !important; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo"><span class="l-my">my</span><span class="l-atlas">Atlas</span><span class="l-dot">.</span></div>
  <div class="loading-tag">Territory Management · VieMed Healthcare</div>
  <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
  <div class="loading-status" id="loadingStatus">Initializing...</div>
</div>

<!-- Header -->
<header>
  <div class="logo"><span class="logo-my">my</span><span class="logo-atlas">Atlas</span><span class="logo-dot">.</span></div>
  <div class="logo-divider"></div>
  <div class="header-filters">
    <select id="dosFilter" onchange="onDosFilter()">
      <option value="">All DOS</option>
      <option value="VALENTINA ARCHER">Valentina Archer</option>
      <option value="MAYCE JOHNSON">Mayce Johnson</option>
      <option value="MISHELLE CHRISTEN">Mishelle Christen</option>
    </select>
    <select id="stateFilter" onchange="onStateSelect()">
      <option value="">— State —</option>
      <option value="AL">AL — Alabama</option><option value="AR">AR — Arkansas</option><option value="AZ">AZ — Arizona</option><option value="FL">FL — Florida</option><option value="GA">GA — Georgia</option><option value="IL">IL — Illinois</option><option value="IN">IN — Indiana</option><option value="KS">KS — Kansas</option><option value="KY">KY — Kentucky</option><option value="LA">LA — Louisiana</option><option value="MI">MI — Michigan</option><option value="MO">MO — Missouri</option><option value="MS">MS — Mississippi</option><option value="NC">NC — North Carolina</option><option value="NM">NM — New Mexico</option><option value="OH">OH — Ohio</option><option value="OK">OK — Oklahoma</option><option value="SC">SC — South Carolina</option><option value="TN">TN — Tennessee</option><option value="TX">TX — Texas</option><option value="VA">VA — Virginia</option><option value="WV">WV — West Virginia</option>
    </select>
    <select id="keyFilter" onchange="onKeyFilterChange()" style="display:none">
      <option value="">All Keys</option>
    </select>
    <span class="selection-badge" id="selectionBadge">0 selected</span>
  </div>
  <div class="header-right">
    <span class="data-badge">POC · Redshift Pipeline</span>
    <button class="btn btn-secondary" onclick="resetView()">Reset</button>
    <button class="btn btn-secondary" onclick="clearSelection()">Clear</button>
    <button class="btn btn-warn" id="moveBtn" disabled onclick="openMoveModal()">Move</button>
    <button class="btn btn-green" id="copyBtn" disabled onclick="openCopyModal()">Copy</button>
  </div>
</header>

<!-- Main -->
<div class="main">
  <div id="map"></div>

  <!-- State Prompt -->
  <div class="state-prompt" id="statePrompt">
    <h2>Select a State to Begin</h2>
    <p>Choose a state to load its ZIP territory boundaries. Neighboring states load automatically for cross-border territories.</p>
    <select id="dosPromptFilter" onchange="onDosPromptFilter()" style="margin-bottom:8px">
      <option value="">Filter by DOS (optional)</option>
      <option value="VALENTINA ARCHER">Valentina Archer</option>
      <option value="MAYCE JOHNSON">Mayce Johnson</option>
      <option value="MISHELLE CHRISTEN">Mishelle Christen</option>
    </select>
    <select id="statePromptSelect" onchange="onStatePromptSelect()">
      <option value="">— Choose a state —</option>
      <option value="AL">AL — Alabama</option><option value="AR">AR — Arkansas</option><option value="AZ">AZ — Arizona</option><option value="FL">FL — Florida</option><option value="GA">GA — Georgia</option><option value="IL">IL — Illinois</option><option value="IN">IN — Indiana</option><option value="KS">KS — Kansas</option><option value="KY">KY — Kentucky</option><option value="LA">LA — Louisiana</option><option value="MI">MI — Michigan</option><option value="MO">MO — Missouri</option><option value="MS">MS — Mississippi</option><option value="NC">NC — North Carolina</option><option value="NM">NM — New Mexico</option><option value="OH">OH — Ohio</option><option value="OK">OK — Oklahoma</option><option value="SC">SC — South Carolina</option><option value="TN">TN — Tennessee</option><option value="TX">TX — Texas</option><option value="VA">VA — Virginia</option><option value="WV">WV — West Virginia</option>
    </select>
    <div style="font-size:10px;color:var(--gray);margin-top:4px;">163 territory keys · 22 active states · Bordering states load automatically</div>
  </div>

  <!-- Panel -->
  <div class="panel">
    <div class="panel-tabs">
      <div class="tab active" onclick="switchTab('territories',this)">Territories</div>
      <div class="tab" onclick="switchTab('selected',this)">Selected</div>
      <div class="tab" onclick="switchTab('detail',this)">Detail</div>
    </div>
    <div class="panel-body" id="tab-territories">
      <div id="statsRow" style="display:none">
        <div class="stat-row">
          <div class="stat-box"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Keys</div></div>
          <div class="stat-box"><div class="stat-num" id="statActive" style="color:var(--green)">—</div><div class="stat-lbl">Active</div></div>
          <div class="stat-box"><div class="stat-num" id="statOpen" style="color:var(--warn)">—</div><div class="stat-lbl">Open</div></div>
          <div class="stat-box"><div class="stat-num" id="statTermed" style="color:var(--danger)">—</div><div class="stat-lbl">Termed</div></div>
        </div>
        <div class="divider"></div>
      </div>
      <div class="search-wrap">
        <input class="search-input" placeholder="Search key, rep, DOS, or TM..." oninput="filterTerritoryList(this.value)" />
      </div>
      <div id="territoryList"><div class="empty-state"><div class="empty-icon">🗺</div>Select a state to see its territory keys.</div></div>
    </div>
    <div class="panel-body" id="tab-selected" style="display:none">
      <div id="selectedContent"><div class="empty-state"><div class="empty-icon">◎</div>Click ZIP codes on the map to select them for reassignment.</div></div>
    </div>
    <div class="panel-body" id="tab-detail" style="display:none">
      <div id="detailContent"><div class="empty-state"><div class="empty-icon">📋</div>Click a ZIP code to see its territory details here.</div></div>
    </div>
    <div class="action-panel" id="actionPanel">
      <div class="action-title">Actions — <span id="selectedCount">0</span> ZIP(s) selected</div>
      <div class="action-row">
        <button class="btn btn-primary" onclick="openMoveModal()">Move to Key</button>
        <button class="btn btn-green" onclick="openCopyModal()">Copy to Key</button>
      </div>
      <div class="action-row">
        <button class="btn btn-secondary" style="flex:1" onclick="clearSelection()">Clear Selection</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="moveModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Move ZIPs</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-field">
      <label>Destination Territory Key</label>
      <select id="destKeySelect"></select>
    </div>
    <div class="modal-warning" id="modalWarning"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// BUILD LOOKUP STRUCTURES
// ════════════════════════════════════════════════════
// zipData[zip] = [{key, county, state}, ...] (array for overlaps)
const zipData = {};
// keyZips[key] = [zip, ...]
const keyZips = {};
// keyColors[key] = color
const keyColors = {};

// Which states have real key assignments (not just Unassigned)
const activeStates = new Set();
Object.keys(KEYS).forEach(k => {
  const prefix = k.replace(/[0-9]/g,'');
  activeStates.add(prefix);
});

// Build zipData and keyZips from GEO
Object.entries(GEO).forEach(([state, rows]) => {
  rows.forEach(([zip, key, county]) => {
    if (!zipData[zip]) zipData[zip] = [];
    zipData[zip].push({ key, county, state });
    if (!keyZips[key]) keyZips[key] = [];
    keyZips[key].push(zip);
  });
});

// Assign colors to keys — group by state prefix for visual coherence
const keysByPrefix = {};
Object.keys(KEYS).forEach(k => {
  const prefix = k.replace(/[0-9]/g,'');
  if (!keysByPrefix[prefix]) keysByPrefix[prefix] = [];
  keysByPrefix[prefix].push(k);
});
let colorIdx = 0;
Object.keys(keysByPrefix).sort().forEach(prefix => {
  keysByPrefix[prefix].sort((a,b) => {
    const na = parseInt(a.replace(/[^0-9]/g,'')) || 0;
    const nb = parseInt(b.replace(/[^0-9]/g,'')) || 0;
    return na - nb;
  }).forEach(k => {
    keyColors[k] = PALETTE[colorIdx % PALETTE.length];
    colorIdx++;
  });
});
keyColors['Unassigned'] = '#D5D8DC';

let map, allLayers = {}, selectedZips = new Set(), loadedStates = new Set();

function init() {

  }).addTo(map);

  buildDestKeySelect();
  setProgress(100, 'Ready');
  setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
}

function setProgress(pct, msg) {
  document.getElementById('loadingFill').style.width = pct + '%';
  document.getElementById('loadingStatus').textContent = msg;
}

// ════════════════════════════════════════════════════
// DOS FILTER
// ════════════════════════════════════════════════════
function onDosFilter() {
  activeDosFilter = document.getElementById('dosFilter').value;
  if (currentState) {
    buildTerritoryListForState(currentState);
    buildKeyFilter();
    // Re-style map to dim non-DOS keys
    Object.entries(allLayers).forEach(([zip, layer]) => {
      layer.setStyle(zipStyle(zip, selectedZips.has(zip), zipData[zip]?.[0]?.state === currentState));
    });
  }
}
function onDosPromptFilter() {
  const dos = document.getElementById('dosPromptFilter').value;
  document.getElementById('dosFilter').value = dos;
  activeDosFilter = dos;
  // Filter state dropdown to only states with keys under this DOS
  const stateSelect = document.getElementById('statePromptSelect');
  const allOpts = stateSelect.querySelectorAll('option');
  if (!dos) {
    allOpts.forEach(o => o.style.display = '');
    return;
  }
  const dosStates = new Set();
  Object.entries(KEYS).forEach(([k, v]) => {
    if (v.d === dos) {
      const prefix = k.replace(/[0-9]/g, '');
      dosStates.add(prefix);
    }
  });
  allOpts.forEach(o => {
    if (!o.value) { o.style.display = ''; return; }
    o.style.display = dosStates.has(o.value) ? '' : 'none';
  });
}

function getFilteredKeys() {
  // Returns keys that match current DOS filter and state
  if (!currentState) return [];
  const prefix = currentState;
  return Object.keys(KEYS).filter(k => {
    const kPrefix = k.replace(/[0-9]/g, '');
    if (kPrefix !== prefix) return false;
    if (activeDosFilter && KEYS[k].d !== activeDosFilter) return false;
    return true;
  });
}

function isKeyVisible(key) {
  if (key === 'Unassigned') return true;
  if (!KEYS[key]) return false;
  if (activeDosFilter && KEYS[key].d !== activeDosFilter) return false;
  return true;
}

// ════════════════════════════════════════════════════
function onStatePromptSelect() {
  const s = document.getElementById('statePromptSelect').value; if (!s) return;
  document.getElementById('stateFilter').value = s;
  document.getElementById('statePrompt').style.display = 'none';
  loadStateAndNeighbors(s);
}
function onStateSelect() {
  const s = document.getElementById('stateFilter').value; if (!s) return;
  document.getElementById('statePrompt').style.display = 'none';
  loadStateAndNeighbors(s);
}

async function loadStateAndNeighbors(state) {
  currentState = state;
  const neighbors = NEIGHBORS[state] || [];
  // Only load neighbor states that have geo data OR GeoJSON files
  const need = [state, ...neighbors].filter(s => !loadedStates.has(s) && GEO_FILES[s]);

  if (need.length === 0) { zoomToState(state); buildTerritoryListForState(state); buildKeyFilter(); return; }

  document.getElementById('loadingOverlay').style.display = 'flex';
  setProgress(10, `Loading ${state} + ${neighbors.length} neighbor(s)...`);

  let done = 0;
  await Promise.all(need.map(async s => {
    try {
      const r = await fetch(GEO_BASE + GEO_FILES[s]);
      if (!r.ok) throw new Error();
      const gj = await r.json();
      renderState(s, gj);
      loadedStates.add(s);
    } catch (e) { console.warn('Could not load', s); }
    done++;
    setProgress(10 + Math.round(done / need.length * 85), `Loaded ${done}/${need.length}...`);
  }));

  setProgress(100, 'Done');
  setTimeout(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
    buildTerritoryListForState(state);
    buildKeyFilter();
    zoomToState(state);
  }, 300);
}

function getZip(f) {
  const p = f.properties;
  return p.ZCTA5CE10 || p.zip || p.ZIP || p.GEOID10 || null;
}

// Get primary key for a ZIP (first non-Unassigned, or Unassigned)
function getPrimaryKey(zip) {
  const entries = zipData[zip];
  if (!entries || !entries.length) return 'Unassigned';
  const assigned = entries.find(e => e.key !== 'Unassigned');
  return assigned ? assigned.key : 'Unassigned';
}

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════
function renderState(state, geojson) {
  const isActive = activeStates.has(state);

  L.geoJSON(geojson, {
    renderer: L.canvas(),
    style: f => {
      const zip = getZip(f);
      const key = getPrimaryKey(zip);
      // If this state has no keys and ZIP is unassigned, show very faint
      if (!isActive && key === 'Unassigned') {
        return { fillColor: '#D5D8DC', fillOpacity: 0.04, color: '#fff', weight: 0.3, opacity: 0.4 };
      }
      return zipStyle(zip, false, state === currentState);
    },
    onEachFeature: (f, layer) => {
      const zip = getZip(f); if (!zip) return;
      allLayers[zip] = layer;
      layer.on('click', e => { L.DomEvent.stopPropagation(e); toggleZip(zip, layer); });
      layer.on('mouseover', () => {
        if (!selectedZips.has(zip)) layer.setStyle({ weight: 2, fillOpacity: 0.85 });
        showPopup(zip, layer);
      });
      layer.on('mouseout', () => {
        if (!selectedZips.has(zip)) layer.setStyle(zipStyle(zip, false, zipData[zip]?.[0]?.state === currentState));
        map.closePopup();
      });
    }
  }).addTo(map);
}

function zipStyle(zip, selected, isPrimary) {
  if (selected) return { fillColor: '#2E67B1', fillOpacity: 0.9, color: '#1a3d6b', weight: 2.5, opacity: 1 };
  const key = getPrimaryKey(zip);
  const color = keyColors[key] || '#D5D8DC';
  const isUnassigned = key === 'Unassigned';
  const neighbor = !isPrimary;

  // DOS filter dimming
  const dosVisible = isKeyVisible(key);

  if (isUnassigned) {
    return { fillColor: '#D5D8DC', fillOpacity: isPrimary ? 0.2 : 0.06, color: '#fff', weight: 0.3, opacity: 0.5 };
  }
  if (neighbor) {
    return { fillColor: color, fillOpacity: 0.12, color: '#fff', weight: 0.3, opacity: 0.6 };
  }
  if (!dosVisible) {
    return { fillColor: '#D5D8DC', fillOpacity: 0.15, color: '#fff', weight: 0.3, opacity: 0.5 };
  }
  return { fillColor: color, fillOpacity: 0.55, color: '#ffffff', weight: 0.5, opacity: 0.8 };
}

function showPopup(zip, layer) {
  const entries = zipData[zip];
  if (!entries || !entries.length) {
    // ZIP not in GeoTable — show as unassigned
    layer.bindPopup(`
      <div style="padding:10px 12px;font-family:'Open Sans',sans-serif;min-width:160px">
        <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#2E67B1;margin-bottom:4px">${zip}</div>
        <div style="font-size:11px;color:#97A3AE">Not in territory data</div>
      </div>`, { closeButton: false, offset: [0, -4] }).openPopup();
    return;
  }

  const primary = entries.find(e => e.key !== 'Unassigned') || entries[0];
  const key = primary.key;
  const info = KEYS[key];
  const color = keyColors[key] || '#D5D8DC';
  const isOverlap = entries.filter(e => e.key !== 'Unassigned').length > 1;
  const overlapKeys = entries.filter(e => e.key !== 'Unassigned').map(e => e.key);

  let statusColor = '#97A3AE';
  let statusText = 'UNASSIGNED';
  if (info) {
    statusText = info.s.toUpperCase();
    statusColor = info.s === 'active' ? '#339846' : info.s === 'termed' ? '#c0392b' : '#F49020';
  }

  let overlapHtml = '';
  if (isOverlap) {
    overlapHtml = `<div style="font-size:10px;color:#7B2FA0;font-weight:600;margin-top:4px">⬢ Shared: ${overlapKeys.join(', ')}</div>`;
  }

  layer.bindPopup(`
    <div style="padding:10px 12px;font-family:'Open Sans',sans-serif;min-width:180px">
      <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#2E67B1;margin-bottom:6px">${zip}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <div style="width:10px;height:10px;border-radius:2px;background:${color};border:1px solid rgba(0,0,0,0.2)"></div>
        <span style="font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:#2E67B1">${key}</span>
      </div>
      <div style="font-size:11px;color:#4a5568;font-weight:500;margin-bottom:1px">${info ? info.r : '—'}</div>
      <div style="font-size:10px;font-weight:700;color:${statusColor};text-transform:uppercase;margin-bottom:2px">${statusText}</div>
      ${info ? `<div style="font-size:10px;color:#97A3AE">${primary.county} County · ${info.d}</div>` : `<div style="font-size:10px;color:#97A3AE">${primary.county} County</div>`}
      ${overlapHtml}
      <div style="font-size:10px;color:#c2d4f0;border-top:1px solid #e2e6ea;padding-top:4px;margin-top:6px">Click to select</div>
    </div>`, { closeButton: false, offset: [0, -4] }).openPopup();
}

function zoomToState(state) {
  const layers = Object.entries(allLayers).filter(([z]) => {
    const e = zipData[z];
    return e && e.some(d => d.state === state);
  }).map(([, l]) => l);
  if (!layers.length) return;
  try {
    const bounds = layers.reduce((a, l) => { try { return a.extend(l.getBounds()); } catch (e) { return a; } }, layers[0].getBounds());
    map.fitBounds(bounds, { padding: [40, 40] });
  } catch (e) {}
}

// ════════════════════════════════════════════════════
// SELECTION
// ════════════════════════════════════════════════════
function toggleZip(zip, layer) {
  if (selectedZips.has(zip)) { selectedZips.delete(zip); layer.setStyle(zipStyle(zip, false, zipData[zip]?.[0]?.state === currentState)); }
  else { selectedZips.add(zip); layer.setStyle(zipStyle(zip, true, true)); }
  updateSelectionUI(); showDetail(zip); switchTab('selected', null);
}
function clearSelection() {
  selectedZips.forEach(z => { const l = allLayers[z]; if (l) l.setStyle(zipStyle(z, false, zipData[z]?.[0]?.state === currentState)); });
  selectedZips.clear(); updateSelectionUI();
}
function removeZip(zip) {
  const l = allLayers[zip]; if (l) l.setStyle(zipStyle(zip, false, zipData[zip]?.[0]?.state === currentState));
  selectedZips.delete(zip); updateSelectionUI();
}
function updateSelectionUI() {
  const n = selectedZips.size;
  document.getElementById('selectionBadge').textContent = `${n} selected`;
  document.getElementById('selectionBadge').style.display = n > 0 ? 'inline-block' : 'none';
  document.getElementById('moveBtn').disabled = n === 0;
  document.getElementById('copyBtn').disabled = n === 0;
  document.getElementById('actionPanel').classList.toggle('visible', n > 0);
  document.getElementById('selectedCount').textContent = n;
  renderSelectedTab();
}
function renderSelectedTab() {
  const c = document.getElementById('selectedContent');
  if (!selectedZips.size) { c.innerHTML = `<div class="empty-state"><div class="empty-icon">◎</div>Click ZIP codes on the map to select them.</div>`; return; }
  const byKey = {};
  selectedZips.forEach(z => { const k = getPrimaryKey(z); (byKey[k] = byKey[k] || []).push(z); });
  let html = `<div class="detail-label">${selectedZips.size} ZIP(s) ready for reassignment</div><div class="divider"></div>`;
  Object.entries(byKey).forEach(([key, zips]) => {
    const color = keyColors[key] || '#D5D8DC';
    const info = KEYS[key];
    html += `<div style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
        <div class="key-swatch" style="background:${color}"></div>
        <span class="key-label">${key}</span>
        <span style="font-size:10px;color:var(--text2)">${info ? info.r : '—'}</span>
      </div>
      <div class="selected-zip-list">
        ${zips.sort().map(z => `<div class="selected-zip-item"><span style="font-weight:500">${z}</span><span class="remove-zip" onclick="removeZip('${z}')">×</span></div>`).join('')}
      </div></div>`;
  });
  c.innerHTML = html;
}

// ════════════════════════════════════════════════════
// DETAIL
// ════════════════════════════════════════════════════
function showDetail(zip) {
  const entries = zipData[zip];
  const primary = entries ? (entries.find(e => e.key !== 'Unassigned') || entries[0]) : null;
  const key = primary ? primary.key : 'Unassigned';
  const info = KEYS[key];
  const color = keyColors[key] || '#D5D8DC';
  const allInKey = keyZips[key] || [];
  const isOverlap = entries ? entries.filter(e => e.key !== 'Unassigned').length > 1 : false;
  const overlapKeys = entries ? entries.filter(e => e.key !== 'Unassigned').map(e => e.key) : [];

  let statusClass = 'status-open';
  let statusText = 'OPEN';
  if (info) {
    statusClass = info.s === 'active' ? 'status-active' : info.s === 'termed' ? 'status-termed' : 'status-open';
    statusText = info.s.toUpperCase();
  }

  let overlapSection = '';
  if (isOverlap) {
    overlapSection = `<div class="detail-section">
      <div class="detail-label">Shared Territory (Overlap)</div>
      <div class="chip-list">${overlapKeys.map(k => `<span class="chip" style="background:#f3e8ff;color:#7B2FA0;border-color:#d8b4fe">${k} — ${KEYS[k] ? KEYS[k].r : '?'}</span>`).join('')}</div>
    </div>`;
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-section">
      <div class="detail-label">ZIP Code</div>
      <div class="detail-value big">${zip}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">${primary ? primary.county + ' County, ' + primary.state : '—'}</div>
    </div>
    <div class="divider"></div>
    <div class="detail-section">
      <div class="detail-label">Territory Key</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
        <div class="key-swatch" style="background:${color};width:14px;height:14px;border-radius:4px"></div>
        <span class="key-label" style="font-size:15px">${key}</span>
        <span class="status-pill ${statusClass}">${statusText}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Assigned Rep</div>
      <div class="detail-value">${info ? info.r : '—'}</div>
    </div>
    ${info ? `<div class="detail-section">
      <div class="detail-label">Sales Director (DOS)</div>
      <div class="detail-value" style="font-size:12px">${info.d || '—'}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Territory Manager</div>
      <div class="detail-value" style="font-size:12px">${info.t || '—'}</div>
    </div>` : ''}
    ${overlapSection}
    <div class="divider"></div>
    <div class="detail-section">
      <div class="detail-label">ZIPs in ${key} (${allInKey.length} total)</div>
      <div class="chip-list">${allInKey.slice(0, 20).map(z => `<span class="chip">${z}</span>`).join('')}${allInKey.length > 20 ? `<span class="chip" style="background:var(--blue-lt);color:var(--blue)">+${allInKey.length - 20} more</span>` : ''}</div>
    </div>
    <div style="margin-top:10px"><button class="btn btn-primary" style="width:100%;font-size:12px" onclick="focusKey('${key}')">Highlight all ZIPs in ${key}</button></div>`;
  switchTab('detail', null);
}

// ════════════════════════════════════════════════════
// TERRITORY LIST
// ════════════════════════════════════════════════════
function buildTerritoryListForState(state) {
  const prefix = state;
  const keys = Object.keys(KEYS).filter(k => k.replace(/[0-9]/g, '') === prefix);
  const filtered = activeDosFilter ? keys.filter(k => KEYS[k].d === activeDosFilter) : keys;
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statActive').textContent = filtered.filter(k => KEYS[k].s === 'active').length;
  document.getElementById('statOpen').textContent = filtered.filter(k => KEYS[k].s === 'open').length;
  document.getElementById('statTermed').textContent = filtered.filter(k => KEYS[k].s === 'termed').length;
  document.getElementById('statsRow').style.display = 'block';
  renderTerritoryList('');
}

function renderTerritoryList(filter) {
  if (!currentState) return;
  const prefix = currentState;
  let keys = Object.keys(KEYS).filter(k => k.replace(/[0-9]/g, '') === prefix);
  if (activeDosFilter) keys = keys.filter(k => KEYS[k].d === activeDosFilter);

  // Sort numerically
  keys.sort((a, b) => {
    const na = parseInt(a.replace(/[^0-9]/g, '')) || 0;
    const nb = parseInt(b.replace(/[^0-9]/g, '')) || 0;
    return na - nb;
  });

  const lf = filter.toLowerCase();
  const filtered = keys.filter(k => {
    if (!lf) return true;
    const info = KEYS[k];
    return k.toLowerCase().includes(lf) || info.r.toLowerCase().includes(lf) || info.d.toLowerCase().includes(lf) || info.t.toLowerCase().includes(lf);
  });

  if (!filtered.length) {
    document.getElementById('territoryList').innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div>No matches.</div>`;
    return;
  }

  document.getElementById('territoryList').innerHTML = filtered.map(key => {
    const info = KEYS[key];
    const color = keyColors[key] || '#D5D8DC';
    const statusClass = info.s === 'active' ? 'status-active' : info.s === 'termed' ? 'status-termed' : 'status-open';
    const statusLabel = info.s === 'active' ? 'ACTIVE' : info.s === 'termed' ? 'TERMED' : 'OPEN';
    const zipCount = (keyZips[key] || []).length;
    return `<div class="territory-item" id="titem-${key}" onclick="focusKey('${key}')">
      <div class="key-swatch" style="background:${color}"></div>
      <div class="key-info">
        <div class="key-rep">${info.r}</div>
        <div class="key-meta">${zipCount} ZIPs · ${info.d}</div>
      </div>
      <span class="key-label">${key}</span>
      <span class="status-pill ${statusClass}">${statusLabel}</span>
    </div>`;
  }).join('');
}
function filterTerritoryList(v) { renderTerritoryList(v); }

function focusKey(key) {
  const bounds = [];
  Object.entries(allLayers).forEach(([zip, layer]) => {
    const isKey = getPrimaryKey(zip) === key || (zipData[zip] && zipData[zip].some(e => e.key === key));
    layer.setStyle({ fillOpacity: isKey ? 0.8 : 0.06, weight: isKey ? 1.5 : 0.3 });
    if (isKey) { try { bounds.push(layer.getBounds()); } catch (e) {} }
  });
  if (bounds.length) {
    const b = bounds.reduce((a, c) => a.extend(c), bounds[0]);
    map.fitBounds(b, { padding: [50, 50] });
  }
  document.querySelectorAll('.territory-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`titem-${key}`); if (el) el.classList.add('active');
}

function buildKeyFilter() {
  const keys = getFilteredKeys().sort((a, b) => {
    const na = parseInt(a.replace(/[^0-9]/g, '')) || 0;
    const nb = parseInt(b.replace(/[^0-9]/g, '')) || 0;
    return na - nb;
  });
  document.getElementById('keyFilter').innerHTML = `<option value="">All Keys</option>` + keys.map(k => `<option value="${k}">${k} — ${KEYS[k].r}</option>`).join('');
  document.getElementById('keyFilter').style.display = 'inline-block';
}
function onKeyFilterChange() {
  const key = document.getElementById('keyFilter').value;
  if (key) focusKey(key); else resetLayerStyles();
}
function resetLayerStyles() {
  Object.entries(allLayers).forEach(([zip, layer]) => layer.setStyle(zipStyle(zip, selectedZips.has(zip), zipData[zip]?.[0]?.state === currentState)));
  document.querySelectorAll('.territory-item').forEach(el => el.classList.remove('active'));
}
function resetView() { resetLayerStyles(); if (currentState) zoomToState(currentState); }

// ════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════
function buildDestKeySelect() {
  const allKeys = Object.keys(KEYS).sort((a, b) => {
    const pa = a.replace(/[0-9]/g, ''), pb = b.replace(/[0-9]/g, '');
    if (pa !== pb) return pa.localeCompare(pb);
    return (parseInt(a.replace(/[^0-9]/g, '')) || 0) - (parseInt(b.replace(/[^0-9]/g, '')) || 0);
  });
  document.getElementById('destKeySelect').innerHTML = allKeys.map(k =>
    `<option value="${k}">${k} — ${KEYS[k].r} (${KEYS[k].s})</option>`
  ).join('');
}
function openMoveModal() {
  currentModalMode = 'move';
  document.getElementById('modalTitle').textContent = `Move ${selectedZips.size} ZIP(s) to Territory`;
  document.getElementById('modalSub').textContent = 'ZIPs will be removed from their current key and assigned to the destination key. In production, this writes back to Redshift via the data pipeline.';
  const btn = document.getElementById('confirmBtn'); btn.className = 'btn btn-primary'; btn.textContent = 'Confirm Move';
  document.getElementById('modalWarning').style.display = 'none';
  document.getElementById('moveModal').classList.add('visible');
}
function openCopyModal() {
  currentModalMode = 'copy';
  document.getElementById('modalTitle').textContent = `Copy ${selectedZips.size} ZIP(s) to Territory`;
  document.getElementById('modalSub').textContent = 'ZIPs will also be assigned to the destination key. Original assignments are preserved — this creates shared market overlap.';
  const btn = document.getElementById('confirmBtn'); btn.className = 'btn btn-green'; btn.textContent = 'Confirm Copy (Overlap)';
  document.getElementById('modalWarning').style.display = 'block';
  document.getElementById('modalWarning').textContent = '⚠ This creates intentional ZIP overlap. Both reps will share these ZIPs.';
  document.getElementById('moveModal').classList.add('visible');
}
function closeModal() { document.getElementById('moveModal').classList.remove('visible'); }
function confirmAction() {
  const dest = document.getElementById('destKeySelect').value;
  const zips = [...selectedZips]; const mode = currentModalMode;
  closeModal();

  // POC: Update in-memory data structures
  zips.forEach(zip => {
    if (mode === 'move') {
      // Remove from old key, assign to new
      if (zipData[zip]) {
        zipData[zip].forEach(e => {
          if (e.key !== 'Unassigned') {
            const arr = keyZips[e.key];
            if (arr) { const i = arr.indexOf(zip); if (i > -1) arr.splice(i, 1); }
          }
        });
        zipData[zip] = [{ key: dest, county: zipData[zip][0]?.county || '', state: zipData[zip][0]?.state || '' }];
      }
    } else {
      // Copy: add additional assignment
      if (zipData[zip]) {
        zipData[zip].push({ key: dest, county: zipData[zip][0]?.county || '', state: zipData[zip][0]?.state || '' });
      }
    }
    if (!keyZips[dest]) keyZips[dest] = [];
    if (!keyZips[dest].includes(zip)) keyZips[dest].push(zip);

    const l = allLayers[zip];
    if (l) l.setStyle(zipStyle(zip, false, zipData[zip]?.[0]?.state === currentState));
  });

  clearSelection();
  buildTerritoryListForState(currentState);
  showToast(`✓ ${zips.length} ZIP(s) ${mode === 'move' ? 'moved to' : 'copied to'} ${dest}`, 'success');
}

// ════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════
function switchTab(name, el) {
  ['territories', 'selected', 'detail'].forEach(t => { document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none'; });
  document.querySelectorAll('.tab').forEach((t, i) => { t.classList.toggle('active', ['territories', 'selected', 'detail'][i] === name); });
}
function showToast(msg, type) {
  const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast ${type || ''}`; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

init();
<\/script>
</body>
</html>
